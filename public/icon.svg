<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="88" fill="#0d1117"/>

  <!-- Top accent line -->
  <rect x="56" y="52" width="400" height="5" rx="2.5" fill="url(#grad)"/>

  <!-- V -->
  <text
    x="64"
    y="340"
    font-family="'Courier New', Courier, monospace"
    font-size="280"
    font-weight="900"
    fill="url(#grad)"
    letter-spacing="-12"
  >VS</text>

  <!-- Bottom dot -->
  <circle cx="256" cy="444" r="12" fill="url(#grad)" opacity="0.6"/>
</svg>
