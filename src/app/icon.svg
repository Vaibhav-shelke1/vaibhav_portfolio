<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- Top accent bar -->
  <rect x="3" y="3" width="26" height="2" rx="1" fill="#00ff88" opacity="0.9"/>
  <!-- Bold V using stroke paths — no font dependency -->
  <polyline
    points="4,10 16,26 28,10"
    stroke="#00ff88"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
